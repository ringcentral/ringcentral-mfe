name: Node.js Package

on:
  release:
    types: [released, prereleased]

jobs:
  publish-npm:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: corepack enable
      - run: yarn
      - run: yarn build
      - run: yarn ci:test
      - run: yarn pre:publish
      - name: Decide npm dist-tag
        id: dist_tag
        run: |
          if [[ "${{ github.event.release.tag_name }}" == *"-beta."* ]]; then
            echo "value=beta" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "Unsupported prerelease tag: ${{ github.event.release.tag_name }}. Use *-beta.* or adjust workflow mapping."
            exit 1
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run publish -- --tag ${{ steps.dist_tag.outputs.value }}
        env:
          CI: true
